# Backend API + Qdrant (the React frontend deploys separately, e.g. Render).
#
#   docker compose up --build
#   -> API at http://localhost:8000/api   (docs at http://localhost:8000/docs)
#
# Requires a .env at the repo root with at least OPENAI_API_KEY (the generator).
# First startup is slow: it downloads the embedding + reranker models (~4 GB)
# into the model_cache volume; later starts reuse it.

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    restart: unless-stopped
    env_file: .env                       # OPENAI_API_KEY (judge keys unused here)
    environment:
      QDRANT_URL: http://qdrant:6333     # use the Qdrant service, not embedded mode
    volumes:
      - model_cache:/home/user/.cache    # persist HF + fastembed model downloads
    ports:
      - "8000:7860"   # host 8000 -> container 7860 (matches Dockerfile CMD)
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  model_cache:
