# Full app in one image (FastAPI serves the React UI + the API) + Qdrant.
#
#   docker compose up --build
#   -> app at http://localhost:8000   (UI at /, API at /api, docs at /docs)
#
# Requires a .env at the repo root with at least OPENAI_API_KEY (the generator).
# First startup is slow: the app downloads the embedding + reranker models
# (~4 GB) into the model_cache volume; later starts reuse it.

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    restart: unless-stopped
    env_file: .env                       # OPENAI_API_KEY (judge keys unused here)
    environment:
      QDRANT_URL: http://qdrant:6333     # use the Qdrant service, not embedded mode
    volumes:
      - model_cache:/home/user/.cache    # persist HF + fastembed model downloads
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  model_cache:
