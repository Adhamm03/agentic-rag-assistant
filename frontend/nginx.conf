server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Proxy API calls to the backend service. Strips the /api prefix:
    #   /api/chat -> http://backend:8000/chat
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # /chat can take ~60s on CPU — raise the read timeout well above nginx's
        # 60s default so long answers aren't cut off.
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
